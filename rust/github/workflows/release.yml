name: CI/CD Release

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build Linux Release
        run: |
          rustup target add x86_64-unknown-linux-gnu
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p ./bin/linux
          cp ./target/x86_64-unknown-linux-gnu/release/commitalyzer ./bin/linux/commit-msg

      - name: Build Arm MacOS Release
        run: |
          rustup target add aarch64-apple-darwin
          sudo apt install aarch64-apple-darwin21-clang
          cargo build --release --target aarch64-apple-darwin --config 'target.aarch64-apple-darwin.linker = "aarch64-apple-darwin21-clang"'
          mkdir -p ./bin/arm-macos
          cp ./target/aarch64-apple-darwin/release/commitalyzer ./bin/arm-macos/commit-msg

      - name: Build Intel MacOS Release
        run: |
          rustup target add x86_64-apple-darwin
          sudo apt install x86_64-apple-darwin21-clang
          cargo build --release --target x86_64-apple-darwin --config 'target.x86_64-apple-darwin.linker = "x86_64-apple-darwin21-clang"'
          mkdir -p ./bin/intel-macos
          cp ./target/x86_64-apple-darwin/release/commitalyzer ./bin/intel-macos/commit-msg

      - name: Build Windows Release
        run: |
          rustup target add x86_64-pc-windows-gnu
          sudo apt install mingw-w64
          cargo build --release --target x86_64-pc-windows-gnu --config 'target.x86_64-pc-windows-gnu.linker = "x86_64-w64-mingw32-gcc"'
          mkdir -p ./bin/windows
          cp ./target/x86_64-pc-windows-gnu/release/commitalyzer.exe ./bin/windows/commit-msg

      - name: Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: ./.release/semver-release
